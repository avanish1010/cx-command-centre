<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ code }} | CX Command Centre</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #eef3fb;
            color: #1e3350;
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .card {
            width: min(640px, 94vw);
            background: #fff;
            border: 1px solid #d9e2f0;
            border-radius: 14px;
            padding: 24px;
        }
        h1 { margin: 0 0 10px; }
        p { margin: 0 0 16px; color: #4d6482; }
        a {
            display: inline-block;
            text-decoration: none;
            padding: 9px 13px;
            border: 1px solid #c8d6ea;
            border-radius: 10px;
            color: #24466f;
            font-weight: 700;
            background: #f4f8ff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Error {{ code }}</h1>
        <p>{{ message }}</p>
        <a href="/dashboard/all" target="_blank" rel="noopener noreferrer">Back to Dashboard</a>
    </div>
</body>
</html>
