<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | CX Command Centre</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #eef4fc;
            color: #1c2f4b;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .card {
            width: min(520px, 92vw);
            background: #fff;
            border: 1px solid #d8e3f1;
            border-radius: 14px;
            padding: 24px;
        }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p { margin: 0 0 16px; color: #4b6180; }
        label { display: block; margin: 10px 0 6px; font-weight: 700; font-size: 12px; color: #3e5578; }
        input { width: 100%; box-sizing: border-box; border: 1px solid #c5d4e9; border-radius: 10px; padding: 10px 12px; }
        .btn { margin-top: 14px; border: none; border-radius: 10px; padding: 11px 12px; width: 100%; background: #2e5da2; color: #fff; font-weight: 700; cursor: pointer; }
        .error { margin-top: 10px; background: #fff3f5; border: 1px solid #f0c2cc; color: #9b2f49; border-radius: 10px; padding: 10px 12px; }
    </style>
</head>
<body>
    <form class="card" method="post" action="/password/reset">
        <h1>Reset Password</h1>
        <p>Set a strong password before continuing to dashboards.</p>

        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <label for="current_password">Current Password</label>
        <input id="current_password" name="current_password" type="password" required autocomplete="current-password">

        <label for="new_password">New Password</label>
        <input id="new_password" name="new_password" type="password" required autocomplete="new-password">

        <label for="confirm_password">Confirm New Password</label>
        <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password">

        <button class="btn" type="submit">Update Password</button>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </form>
</body>
</html>
